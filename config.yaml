# ══════════════════════════════════════════════════════════════════════════════
#  XGB PROTOTYPE  ·  Training Configuration
# ══════════════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────
#  TASK
# ─────────────────────────────────────────────
task: classification        # "classification" | "regression"
target_col: Class
test_size: 0.2
random_state: 42


# ─────────────────────────────────────────────
#  PATHS
# ─────────────────────────────────────────────
data_path: creditcard.csv   # .csv · .parquet · .json · .jsonl · .xlsx
                            # glob patterns also supported: "data/batch_*.csv"
model_output_dir: models    # timestamped model artifacts saved here
plot_output_dir: plots      # HTML + PNG plots saved here


# ─────────────────────────────────────────────
#  DATA LOADING
# ─────────────────────────────────────────────
csv_chunk_size: null        # null = load all at once
                            # int  = stream CSV in row-chunks (useful for large files)
csv_chunk_log_every: 10     # log progress every N chunks when chunked loading is active


# ─────────────────────────────────────────────
#  LOGGING
# ─────────────────────────────────────────────
log_level: INFO             # DEBUG | INFO | WARNING | ERROR
log_file: null              # null = stdout only; path = write to file e.g. "train.log"


# ─────────────────────────────────────────────
#  CROSS-VALIDATION
# ─────────────────────────────────────────────
#   cv_folds > 0  → always use CV with that many folds
#   cv_folds = 0  → always use fast-path subsample
#   cv_folds = -1 → auto: CV when n_rows < 50k, fast-path otherwise (recommended)
cv_folds: -1
cv_strategy: stratified     # "stratified" | "timeseries"


# ─────────────────────────────────────────────
#  HYPERPARAMETER SEARCH
# ─────────────────────────────────────────────
search:
  backend: optuna             # "optuna" | "native_xgb_cv"
  native_xgb_cv_rounds: 500   # used when backend=native_xgb_cv
  native_xgb_cv_early_stop: 20

n_trials: 30
optuna_budget_seconds: null # wall-clock budget cap (overrides n_trials when set)
optuna_timeout: null        # per-trial timeout in seconds

# Fast-path subsampling (used when cv_folds = 0 or auto fast-path is triggered)
search_subsample: 0.6       # fraction of training rows per trial; hard-capped at 50k rows

# n_estimators search strategy — choose one:
#   tune_n_estimators: true  → Optuna searches n_estimators directly (no early stopping in trials)
#   tune_n_estimators: false → early stopping drives n_estimators (original behaviour)
tune_n_estimators: true
n_estimators_min: 100
n_estimators_max: 500
early_stop_rnds: 20         # rounds without improvement before early stopping triggers

# Broader search space (more trials recommended alongside this)
wide_search: false          # true → broader hyperparameter ranges

# Sobol sensitivity analysis for max_depth, learning_rate, and subsample.
# Helps identify which parameters actually move the validation metric.
sobol_sensitivity:
  enabled: false
  n_base_samples: 16
  max_evals: 128


# ─────────────────────────────────────────────
#  PREPROCESSING
# ─────────────────────────────────────────────
robust_scaler_cols: ["Amount", "Time"]  # these columns get RobustScaler
                                        # all other numeric columns get PowerTransformer
power_transform: true                   # apply PowerTransformer to non-robust-scaled numeric cols

# Applied before any scaling or feature engineering
pretransform_log1p_cols: []             # log1p applied to these columns first
pretransform_drop_cols: []              # columns dropped before any feature work

# Variance filter — applied before RFECV
variance_threshold: 0.0     # drop numeric columns at or below this variance

# Automatic type inference
cardinality_limit: 20       # integer columns with ≤ N unique values are treated as categorical

# Target encoding (replaces one-hot encoding for high-cardinality object columns)
target_encoding_threshold: 50  # object columns with > N unique values → TargetEncoder

# Feature interaction expansion
interaction_top_k: 10       # max correlated numeric feature pairs to generate cross-features

# Optional automated feature engineering. Featuretools is the default for
# generic tabular data; tsfresh is available for long/time-series tables.
auto_feature_engineering:
  enabled: false
  engine: featuretools       # "featuretools" | "tsfresh"
  max_features: 25
  max_depth: 1
  entity_id_col: null
  time_index_col: null
  tsfresh_column_id: null
  tsfresh_column_sort: null


# ─────────────────────────────────────────────
#  PCA
# ─────────────────────────────────────────────
pca_threshold: 999          # apply PCA only when feature count exceeds this value
pca_variance: 0.95          # retain this fraction of explained variance
pca_max_components: null    # hard cap on components; null = no cap


# ─────────────────────────────────────────────
#  CLASS IMBALANCE
# ─────────────────────────────────────────────
imbalance_threshold: 0.15   # minority class ratio below this triggers imbalance handling


# ─────────────────────────────────────────────
#  FEATURE SELECTION
# ─────────────────────────────────────────────
feature_selection: false    # RFECV is powerful but expensive; enable for slower audit runs


# ─────────────────────────────────────────────
#  OUTLIER DETECTION
# ─────────────────────────────────────────────
outlier_contamination: 0.05 # IsolationForest expected outlier fraction (0–0.5)


# ─────────────────────────────────────────────
#  OBJECTIVE & METRIC
# ─────────────────────────────────────────────
# "auto" selects the metric based on task type and class balance.
#
# Classification metrics:
#   roc_auc · auprc · accuracy · balanced_accuracy
#   f1_macro · f1_weighted · precision_macro · recall_macro
#   log_loss · brier_score · ece · hamming_loss
#
# Regression metrics:
#   r2 · rmse · mae · mse · median_absolute_error
metric: auto


# ─────────────────────────────────────────────
#  THRESHOLD POLICY  (binary classification only)
# ─────────────────────────────────────────────
#   auto                  → picks the mode best suited to the chosen metric
#   f1                    → maximise F1 score
#   fbeta                 → maximise F-beta (set beta below)
#   precision_at_recall   → highest precision subject to min_recall
#   recall_at_precision   → highest recall subject to min_precision
#   disabled              → use default 0.5 threshold
threshold_policy:
  mode: auto
  beta: 1.0               # F-beta weight; >1 favours recall, <1 favours precision
  min_precision: 0.80     # floor for mode=recall_at_precision
  min_recall: 0.80        # floor for mode=precision_at_recall
  n_quantiles: 200        # candidate threshold points sampled from predicted probabilities


# ─────────────────────────────────────────────
#  CALIBRATION
# ─────────────────────────────────────────────
calibration_enabled: true   # post-hoc probability calibration on validation predictions

# ─────────────────────────────────────────────
#  UNCERTAINTY ESTIMATION
# ─────────────────────────────────────────────
uncertainty:
  enabled: false
  alpha: 0.10                # 90% conformal coverage target
  quantile_alpha_low: 0.05   # regression quantile lower bound
  quantile_alpha_high: 0.95  # regression quantile upper bound


# ─────────────────────────────────────────────
#  BASELINE COMPARISON
# ─────────────────────────────────────────────
baselines:
  enabled: false
  include_dummy: true         # DummyClassifier / DummyRegressor
  include_linear: true        # LogisticRegression (classification) or Ridge (regression)
  include_default_xgb: true   # non-tuned XGBoost reference model


# ─────────────────────────────────────────────
#  ENSEMBLE  (top-K Optuna trials)
# ─────────────────────────────────────────────
ensemble:
  enabled: false    # fit a soft-voting ensemble from the top-K completed Optuna trials
  top_k: 3


# ─────────────────────────────────────────────
#  DRIFT DETECTION
# ─────────────────────────────────────────────
drift_alpha: 0.05           # p-value threshold; feature flagged if p < alpha
drift_warn_only: true       # false → raise ValueError on drift (blocks training)


# ─────────────────────────────────────────────
#  CONTINUOUS DRIFT MONITORING
# ─────────────────────────────────────────────
drift_monitor:
  enabled: false
  persistence: 3                  # only alert after drift persists for N consecutive checks
  min_feature_drift_ratio: 0.10   # minimum fraction of drifted features to trigger alert
  retrain_feature_ratio: 0.25     # fraction of drifted features that triggers auto-retrain
  retrain_severity: high          # none | low | medium | high


# ─────────────────────────────────────────────
#  DIAGNOSTICS & PLOTS
# ─────────────────────────────────────────────
callback_log_period: 50     # log XGBoost boosting progress every N rounds

diagnostics:
  plots_enabled: false          # master switch; set true to enable all plots below
  optuna_plots: true            # hyperparameter importance + optimisation history
  learning_curve: true          # train vs. validation score vs. training size
  permutation_importance: true  # model-agnostic feature importance
  threshold_sweep: true         # precision/recall/F1 vs. decision threshold
  partial_dependence: true      # PDP + ICE for top-N features
  pca_plots: true               # explained variance and component projections
  outlier_report: true          # IsolationForest anomaly score distribution

pdp_top_n: 5                # number of top features (by XGBoost gain) to include in PDP+ICE


# ─────────────────────────────────────────────
#  VALIDATION
# ─────────────────────────────────────────────
pandera_validation: false   # infer and run Pandera schema checks on input data


# ─────────────────────────────────────────────
#  RUNTIME
# ─────────────────────────────────────────────
use_gpu: false              # true → prefer CUDA; falls back to CPU if unavailable


# ─────────────────────────────────────────────
#  MLFLOW EXPERIMENT TRACKING
# ─────────────────────────────────────────────
mlflow_tracking_uri: null   # e.g. "http://localhost:5000"; null = MLflow disabled
mlflow_experiment: xgb_prototype


# ─────────────────────────────────────────────
#  REGRESSION EXTRAS
# ─────────────────────────────────────────────
target_log_transform: false # true → apply log1p(y) before training (requires y > 0)
